<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Sistema de Comisiones</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="header-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h2>Bienvenido</h2>
            <p>Portal de Gestión de Comisiones</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="codigo" placeholder="Código de Empleado" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="documento" placeholder="N° de Identidad" required>
                </div>
                <button type="submit" id="btnLogin">
                    <span>Entrar al Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div id="mensaje" class="error-msg"></div>
        </div>
    </div>
</body>
</html>
