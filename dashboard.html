<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Sistema de Comisiones</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <strong>Cargando información...</strong>
    </div>

    <div class="dashboard-wrapper">
        <header class="top-bar">
            <div class="brand">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <h1>Sistema<span>Comisiones</span></h1>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <strong id="userName">Cargando...</strong>
                    <span id="pdv">Cargando sucursal...</span>
                </div>
                <button onclick="logout()" class="logout-pill"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="dashboard-body">
            <nav class="view-switcher">
                <button onclick="switchView('comisiones')" id="tab-comisiones" class="tab-btn active">
                    <i class="fas fa-wallet"></i> Mis Comisiones
                </button>
                <button onclick="switchView('dinamicas')" id="tab-dinamicas" class="tab-btn">
                    <i class="fas fa-fire"></i> Seguimiento de Dinámicas
                </button>
            </nav>

            <section class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label" id="mainLabel">Total Acumulado</span>
                    <div class="stat-value" id="totalGeneral">$ 0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label" id="secondaryLabel">Periodo de Análisis</span>
                    <div class="stat-value small">
                        <input type="month" id="fechaFiltro" onchange="cargarDinamicasConFiltro()" class="date-input">
                    </div>
                </div>
            </section>

            <div class="content-card">
                <div id="view-comisiones" class="view-section">
                    <table class="main-table">
                        <thead>
                            <tr>
                                <th>Laboratorio / Entidad</th>
                                <th class="text-right">Monto Neto</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div id="view-dinamicas" class="view-section hidden" style="padding: 20px;">
                    <div class="table-header-grid">
                        <div>Producto</div>
                        <div class="text-center">Progreso de Venta</div>
                        <div class="text-right">Estado</div>
                    </div>
                    <div id="tableDinamicas">
                        </div>
                </div>
            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
