<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Panel de Control | Recolección de puntos</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <strong>Cargando información...</strong>
    </div>

    <div class="dashboard-wrapper">
        <header class="top-bar">
            <div class="brand">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <h1><span>Seguimiento de actividades</span></h1>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <strong id="userName" title="Nombre del Empleado">Cargando...</strong>
                    <span id="userCedula" style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;"><i class="fas fa-id-card"></i> C.C. Cargando...</span>
                </div>
                <button onclick="logout()" class="logout-pill"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="dashboard-body">

            <div class="carousel-container" id="bannerCarousel">
                <div class="carousel-slides" id="carouselSlides">
                </div>
                
                <button class="carousel-btn prev" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="carousel-btn next" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
                
                <div class="carousel-dots" id="carouselDots">
                </div>
            </div>  

            <nav class="view-switcher">
                <button onclick="switchView('admin')" id="tab-admin" class="tab-btn hidden">
                    <i class="fas fa-chess-king"></i> Visión Global
                </button>
                
                <button onclick="switchView('lideres')" id="tab-lideres" class="tab-btn hidden">
                    <i class="fas fa-users-cog"></i> Visión Equipo
                </button>
                
                <button onclick="switchView('dinamicas')" id="tab-dinamicas" class="tab-btn active">
                    <i class="fas fa-fire"></i> Seguimiento Activo
                </button>
                
                <button onclick="switchView('comisiones')" id="tab-comisiones" class="tab-btn">
                    <i class="fas fa-wallet"></i> Mis Puntos
                </button>
            </nav>

            <section class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label" id="mainLabel">Total Puntos</span>
                    <div class="stat-value" id="totalGeneral">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label" id="secondaryLabel">Periodo de Análisis</span>
                    <div class="stat-value small">
                        <input type="month" id="fechaFiltro" onchange="cargarDinamicasConFiltro()" class="date-input">
                    </div>
                </div>
            </section>

            <div class="content-card">
                
                <div id="view-admin" class="view-section hidden" style="padding: 20px;">
                    
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                        <button class="tab-btn active" id="subtab-nacional" onclick="cambiarSubVistaAdmin('nacional')" style="flex: 1; min-width: 140px;">Vista Nacional</button>
                        <button class="tab-btn" id="subtab-coordinador" onclick="cambiarSubVistaAdmin('coordinador')" style="flex: 1; min-width: 140px;">Coordinaciones</button>
                        <button class="tab-btn" id="subtab-supervisor" onclick="cambiarSubVistaAdmin('supervisor')" style="flex: 1; min-width: 140px;">Supervisiones</button>
                        <button class="tab-btn" id="subtab-especial" onclick="cambiarSubVistaAdmin('especial')" style="flex: 1; min-width: 140px;">Callcenter y Supernum.</button>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
    
                        <div style="position: relative;">
                            <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                            <input type="text" id="adminSearchEntidad" list="adminEntidadesList" oninput="aplicarFiltrosAdmin()" placeholder="Buscar o seleccionar..." style="width: 100%; box-sizing: border-box; padding: 12px 12px 12px 40px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit;">
                            <datalist id="adminEntidadesList"></datalist>
                        </div>
                    
                        <div>
                            <select id="adminSelectDinamica" onchange="aplicarFiltrosAdmin()" style="width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; background: white;">
                                <option value="TODAS">Todas las Dinámicas</option>
                            </select>
                        </div>
                    
                        <button onclick="limpiarFiltrosAdmin()" style="width: 100%; box-sizing: border-box; padding: 12px 20px; background: #fff1f2; color: #e11d48; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;">
                            <i class="fas fa-eraser"></i> Limpiar Filtros
                        </button>
                    </div>

                    <div id="containerAdmin"></div>
                </div>

                <div id="view-lideres" class="view-section hidden" style="padding: 20px;">
                    <div class="table-header-grid" style="grid-template-columns: 1fr; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; text-align: center;">
                        <strong style="color: var(--text-main); font-size: 1.1rem;">Supervisión de Sucursales a Cargo</strong>
                    </div>
                    <div id="containerLideres">
                    </div>
                </div>

                <div id="view-dinamicas" class="view-section" style="padding: 20px;">
                    <div class="table-header-grid" style="grid-template-columns: 1fr; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; text-align: center;">
                        <strong style="color: var(--text-main); font-size: 1.1rem;">Proceso y metas por actividad</strong>
                    </div>
                    <div id="tableDinamicas">
                    </div>
                </div>

                <div id="view-comisiones" class="view-section hidden">
                    <table class="main-table">
                        <thead>
                            <tr>
                                <th>Laboratorio / Producto</th>
                                <th class="text-right">Monto Obtenido</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
